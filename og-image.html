<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#050510;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(124,58,237,0.15),transparent 70%)}
.card{position:relative;z-index:1;text-align:center;padding:60px}
.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
.logo-dot{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.logo-text{font-size:42px;font-weight:700;color:#c4b5fd;letter-spacing:-1px}
h1{font-size:52px;font-weight:800;color:#f0edff;line-height:1.2;margin-bottom:16px;letter-spacing:-2px}
h1 span{background:linear-gradient(135deg,#c4b5fd,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{font-size:20px;color:rgba(220,215,255,0.7);max-width:600px;margin:0 auto 28px;line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,0.15);border:1px solid rgba(167,139,250,0.25);padding:8px 20px;border-radius:100px;font-size:14px;color:#a78bfa;font-weight:500}
.url{position:absolute;bottom:32px;right:48px;font-size:16px;color:rgba(167,139,250,0.5);font-weight:500}
</style></head>
<body>
<div class="card">
  <div class="logo"><div class="logo-dot"></div><div class="logo-text">aura.</div></div>
  <h1>Sua operação inteira.<br><span>Em um só lugar.</span></h1>
  <p>Gestão financeira, vendas, clientes e contabilidade para MEI e pequenos negócios.</p>
  <div class="badge">A partir de R$89/mês · Sem contrato</div>
</div>
<div class="url">getaura.com.br</div>
</body>
</html>
