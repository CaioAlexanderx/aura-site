<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Fundo do ícone -->
    <radialGradient id="bg-grad" cx="38%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#110a2e"/>
    </radialGradient>

    <!-- Núcleo -->
    <radialGradient id="core-icon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>

    <!-- Gradiente dos arcos — fade direcional -->
    <linearGradient id="a1" x1="5%" y1="0%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#e9d5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a2" x1="5%" y1="0%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a3" x1="5%" y1="0%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a4" x1="5%" y1="0%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>

    <!-- Gradiente do ponto -->
    <radialGradient id="dot-icon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5f3ff"/>
      <stop offset="50%"  stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>

    <!-- Glow núcleo -->
    <filter id="g-core" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow ponto -->
    <filter id="g-dot" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow suave arcos -->
    <filter id="g-arc" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado (ícone de app) -->
  <rect width="200" height="200" rx="44" fill="url(#bg-grad)"/>

  <!-- Brilho sutil no canto superior esquerdo -->
  <ellipse cx="52" cy="48" rx="55" ry="45"
    fill="#ffffff" opacity="0.04"/>

  <!-- ══════════════════════════════ -->
  <!--  SÍMBOLO SIMPLIFICADO          -->
  <!--  Centro: (95, 105)             -->
  <!-- ══════════════════════════════ -->

  <!-- Arco 4 — externo, fantasma -->
  <path d="M 95,29 A 76,76 0 1 1 20,108"
    fill="none" stroke="url(#a4)" stroke-width="1.6"
    stroke-linecap="round" filter="url(#g-arc)"/>

  <!-- Arco 3 -->
  <path d="M 95,42 A 63,63 0 1 1 33,115"
    fill="none" stroke="url(#a3)" stroke-width="2.2"
    stroke-linecap="round" filter="url(#g-arc)"/>

  <!-- Arco 2 -->
  <path d="M 95,56 A 49,49 0 1 1 47,122"
    fill="none" stroke="url(#a2)" stroke-width="2.8"
    stroke-linecap="round" filter="url(#g-arc)"/>

  <!-- Arco 1 — interno, mais vivo -->
  <path d="M 95,71 A 34,34 0 1 1 62,127"
    fill="none" stroke="url(#a1)" stroke-width="3.4"
    stroke-linecap="round" filter="url(#g-arc)"/>

  <!-- Núcleo luminoso -->
  <circle cx="95" cy="105" r="12"
    fill="url(#core-icon)"
    filter="url(#g-core)"/>
  <circle cx="95" cy="105" r="4.5"
    fill="#ffffff" opacity="0.98"/>

  <!-- ══════════════════════════════ -->
  <!--  PONTO — canto inferior dir.  -->
  <!--  Espelho do núcleo             -->
  <!-- ══════════════════════════════ -->

  <!-- Halo externo do ponto -->
  <circle cx="146" cy="148" r="13"
    fill="#8b5cf6" opacity="0.18"
    filter="url(#g-dot)"/>
  <!-- Corpo -->
  <circle cx="146" cy="148" r="9"
    fill="url(#dot-icon)"
    filter="url(#g-dot)"/>
  <!-- Reflexo interno -->
  <circle cx="143" cy="145" r="3"
    fill="#ffffff" opacity="0.55"/>

</svg>
